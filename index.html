<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partoo Analytics Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:        #060c1f;
      --surface:   rgba(255,255,255,0.04);
      --surface-h: rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.08);
      --border-h:  rgba(255,255,255,0.16);
      --txt:       #f1f5f9;
      --txt2:      #94a3b8;
      --txt3:      #4b5f79;
      --indigo:    #6366f1;
      --violet:    #8b5cf6;
      --emerald:   #10b981;
      --radius:    14px;
    }
    body { background: var(--bg); color: var(--txt); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    #bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 15% 15%, rgba(99,102,241,.09) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(139,92,246,.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 55% 45%, rgba(6,182,212,.05) 0%, transparent 60%);
    }
    #root { position: relative; z-index: 1; }
    .layout { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Navbar ── */
    .navbar { position: sticky; top: 0; z-index: 200; background: rgba(6,12,31,.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); display: flex; align-items: stretch; padding: 0 32px; gap: 0; }
    .nav-brand { display: flex; align-items: center; gap: 14px; padding: 0 24px 0 0; border-right: 1px solid var(--border); margin-right: 8px; }
    .logo-box { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--indigo), var(--violet)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,.35); flex-shrink: 0; }
    .nav-title { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #a5b4fc, #e0e7ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
    .nav-sub { font-size: 10px; color: var(--txt3); margin-top: 1px; }

    /* tabs live inside the navbar */
    .nav-tabs { display: flex; align-items: stretch; gap: 0; flex: 1; }
    .nav-tab { display: inline-flex; align-items: center; gap: 8px; padding: 0 20px; height: 64px; font-size: 13px; font-weight: 600; color: var(--txt3); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: color .2s, border-color .2s; font-family: 'Inter', sans-serif; white-space: nowrap; position: relative; }
    .nav-tab:hover { color: var(--txt2); }
    .nav-tab.active { color: #a5b4fc; border-bottom-color: var(--indigo); }
    .nav-tab-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.3); color: #a5b4fc; font-weight: 700; }
    .nav-tab-badge.warn { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.3); color: #fbbf24; }

    .nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .nav-market { display: flex; align-items: center; gap: 7px; padding: 4px 13px; border-radius: 20px; background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.22); font-size: 12px; font-weight: 600; color: #a5b4fc; }
    .nav-market-flag { font-size: 17px; line-height: 1; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid; }
    .pill-on  { color: var(--emerald); background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.25); }
    .pill-off { color: var(--txt3); background: rgba(75,95,121,.1); border-color: rgba(75,95,121,.2); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .dot-pulse { animation: dotpulse 2s ease-in-out infinite; }
    @keyframes dotpulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .timestamp { font-size: 12px; color: var(--txt3); }

    /* ── Main ── */
    .main { max-width: 1380px; margin: 0 auto; padding: 28px 32px 56px; width: 100%; }
    @media(max-width:560px){ .main { padding: 16px 16px 40px; } .navbar { padding: 0 16px; } }

    /* ── Settings page ── */
    .settings-page { max-width: 860px; }
    .settings-header { margin-bottom: 28px; }
    .settings-title { font-size: 22px; font-weight: 800; color: var(--txt); margin-bottom: 6px; }
    .settings-desc { font-size: 14px; color: var(--txt3); line-height: 1.6; }

    .keys-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .keys-card-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .keys-card-title { font-size: 14px; font-weight: 700; color: var(--txt); display: flex; align-items: center; gap: 10px; }
    .keys-card-count { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.25); color: #a5b4fc; font-weight: 700; }

    .keys-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px,1fr)); gap: 8px; padding: 18px 24px; }
    .market-key-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; background: rgba(255,255,255,.02); border: 1px solid var(--border); transition: border-color .2s, background .2s; }
    .market-key-row:hover { border-color: var(--border-h); background: rgba(255,255,255,.035); }
    .market-label { display: flex; align-items: center; gap: 8px; min-width: 160px; flex-shrink: 0; }
    .market-flag { font-size: 22px; line-height: 1; }
    .market-code { font-size: 12px; font-weight: 700; color: var(--txt); min-width: 34px; }
    .market-name { font-size: 11px; color: var(--txt3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
    .market-saved-dot { color: var(--emerald); font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .key-input-sm { flex: 1; min-width: 0; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 8px; padding: 8px 13px; color: var(--txt); font-size: 12px; font-family: 'Courier New', monospace; outline: none; transition: border-color .2s, box-shadow .2s; }
    .key-input-sm:focus { border-color: var(--indigo); box-shadow: 0 0 0 2px rgba(99,102,241,.15); }
    .key-input-sm::placeholder { color: var(--txt3); font-family: 'Inter', sans-serif; font-size: 11px; }

    .keys-card-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,.015); }
    .keys-footer-hint { font-size: 12px; color: var(--txt3); line-height: 1.5; }

    /* ── Dashboard panel ── */
    .dash-control { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 28px; overflow: hidden; }
    .dash-control-inner { padding: 18px 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .market-selector-label { font-size: 11px; font-weight: 700; color: var(--txt3); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
    .market-pills-scroll { display: flex; gap: 7px; flex-wrap: wrap; flex: 1; }
    .market-pill { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--txt2); cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
    .market-pill:hover { border-color: var(--border-h); background: rgba(255,255,255,.08); color: var(--txt); }
    .market-pill.active { background: linear-gradient(135deg,rgba(99,102,241,.2),rgba(139,92,246,.2)); border-color: rgba(99,102,241,.45); color: #c4b5fd; box-shadow: 0 2px 12px rgba(99,102,241,.2); }
    .market-pill-flag { font-size: 17px; line-height: 1; }
    .market-hint { font-size: 13px; color: var(--txt3); }
    .market-hint a { color: #818cf8; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
    .dash-divider { height: 1px; background: var(--border); margin: 0; }
    .dash-run-row { padding: 14px 24px; display: flex; align-items: center; gap: 10px; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all .2s; white-space: nowrap; font-family: 'Inter', sans-serif; }
    .btn-run { background: linear-gradient(135deg, var(--indigo), var(--violet)); color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,.3); }
    .btn-run:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(99,102,241,.45); }
    .btn-run:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-ghost { background: rgba(255,255,255,.06); color: var(--txt2); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,.1); color: var(--txt); }
    .btn-ghost:disabled { opacity: .4; cursor: not-allowed; }
    .btn-save { background: rgba(16,185,129,.1); color: var(--emerald); border: 1px solid rgba(16,185,129,.25); }
    .btn-save:hover:not(:disabled) { background: rgba(16,185,129,.18); }
    .btn-save:disabled { opacity: .4; cursor: not-allowed; }
    .spinner { width: 15px; height: 15px; border-radius: 50%; border: 2px solid rgba(255,255,255,.25); border-top-color: #fff; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section dividers ── */
    .sec-divider { display: flex; align-items: center; gap: 14px; margin: 8px 0 22px; }
    .sec-line { flex: 1; height: 1px; background: var(--border); }
    .sec-badge { padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; border: 1px solid; white-space: nowrap; }
    .badge-review   { color: #f43f5e; background: rgba(244,63,94,.09); border-color: rgba(244,63,94,.25); }
    .badge-presence { color: #818cf8; background: rgba(99,102,241,.09); border-color: rgba(99,102,241,.25); }

    /* ── Cards ── */
    .cards-2    { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; margin-bottom: 16px; }
    .cards-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 16px; margin-bottom: 24px; }
    @media(max-width:700px){ .cards-2 { grid-template-columns: 1fr; } }
    @media(max-width:560px){ .cards-auto { grid-template-columns: 1fr; } }

    .card { position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; transition: transform .25s, box-shadow .25s, border-color .25s, background .25s; }
    .card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--card-accent); opacity: .85; }
    .card:hover { transform: translateY(-3px); border-color: var(--border-h); box-shadow: 0 10px 36px rgba(0,0,0,.35); background: var(--surface-h); }
    .card-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 16px; background: var(--card-icon-bg); }
    .card-label { font-size: 11px; font-weight: 600; color: var(--txt3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .card-value { font-size: 38px; font-weight: 900; line-height: 1; margin-bottom: 6px; background: var(--card-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: fadeUp .45s ease both; }
    .card-unit { font-size: 12px; color: var(--txt3); margin-top: 4px; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

    .stars { display: flex; gap: 3px; margin-bottom: 8px; }
    .star-full  { color: #f59e0b; font-size: 18px; }
    .star-half  { color: #f59e0b; font-size: 18px; opacity: .55; }
    .star-empty { color: rgba(245,158,11,.18); font-size: 18px; }

    .skel { background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.09) 50%, rgba(255,255,255,.04) 100%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    .skel-val { height: 38px; width: 90px; margin-bottom: 8px; }
    .skel-lbl { height: 11px; width: 110px; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    /* ── Reply-time card ── */
    .rt-header { display: flex; align-items: center; margin-bottom: 18px; gap: 12px; }
    .rt-total { font-size: 22px; font-weight: 800; background: linear-gradient(135deg,#06b6d4,#6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .rt-breakdown { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 14px; }
    @media(max-width:560px){ .rt-breakdown { grid-template-columns: 1fr; } }
    .rt-bucket { border-radius: 10px; padding: 14px 16px; border: 1px solid; }
    .rt-bucket-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .rt-bucket-icon { width: 24px; height: 24px; border-radius: 7px; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .rt-bucket-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #94a3b8; }
    .rt-bucket-val { font-size: 28px; font-weight: 900; line-height: 1; }
    .rt-bucket-pct { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .rt-bar { height: 7px; border-radius: 999px; overflow: hidden; display: flex; gap: 3px; }
    .rt-bar-seg { border-radius: 999px; min-width: 4px; }
    .rt-card-mb { margin-bottom: 32px; }

    /* ── Chart ── */
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-top: 4px; }
    .chart-title { font-size: 14px; font-weight: 600; color: var(--txt2); margin-bottom: 20px; }
    .chart-inner { height: 280px; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-icon  { font-size: 52px; margin-bottom: 18px; opacity: .25; }
    .empty-title { font-size: 20px; font-weight: 700; color: var(--txt2); margin-bottom: 8px; }
    .empty-desc  { font-size: 14px; color: var(--txt3); line-height: 1.7; max-width: 400px; margin: 0 auto; }
    .empty-desc a { color: #818cf8; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }

    /* ── Toast ── */
    .toast { position: fixed; top: 76px; right: 24px; z-index: 9999; display: flex; align-items: center; gap: 10px; padding: 13px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; border: 1px solid; animation: toastIn .3s cubic-bezier(.34,1.56,.64,1) both; }
    .toast-ok  { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.3); color: #34d399; }
    .toast-err { background: rgba(244,63,94,.12);  border-color: rgba(244,63,94,.3);  color: #fb7185; }
    @keyframes toastIn { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }

    /* ── Debug panel ── */
    .debug-panel { margin: 24px 0 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .debug-toggle { width: 100%; background: rgba(255,255,255,.03); border: none; cursor: pointer; padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; color: var(--txt2); font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; transition: background .2s; }
    .debug-toggle:hover { background: rgba(255,255,255,.06); }
    .debug-toggle-left { display: flex; align-items: center; gap: 8px; }
    .debug-body { display: none; padding: 0 16px 16px; max-height: 600px; overflow-y: auto; }
    .debug-body.open { display: block; }
    .debug-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 10px; margin-top: 12px; }
    .debug-entry { background: rgba(0,0,0,.25); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .debug-entry-header { padding: 8px 12px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .debug-metric-name { font-size: 11px; font-weight: 600; font-family: 'Courier New', monospace; color: #a5b4fc; }
    .debug-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
    .debug-badge.ok  { background: rgba(16,185,129,.15); color: #34d399; }
    .debug-badge.nil { background: rgba(244,63,94,.15); color: #fb7185; }
    .debug-json { padding: 10px 12px; font-size: 11px; line-height: 1.6; font-family: 'Courier New', monospace; color: var(--txt2); white-space: pre-wrap; word-break: break-all; max-height: 220px; overflow-y: auto; }
    .debug-copy { font-size: 10px; padding: 2px 7px; border-radius: 5px; background: rgba(255,255,255,.06); border: 1px solid var(--border); color: var(--txt3); cursor: pointer; font-family: 'Inter', sans-serif; }
    .debug-copy:hover { background: rgba(255,255,255,.12); color: var(--txt2); }
    .debug-filter { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--txt); font-size: 12px; font-family: 'Inter', sans-serif; outline: none; width: 220px; }
    .debug-filter:focus { border-color: var(--indigo); }
    .debug-toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 0 4px; }

    .ai-key-row { margin: 0 24px 18px; padding: 16px; border-radius: 10px; background: rgba(255,255,255,.02); border: 1px solid var(--border); }
    .ai-key-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .ai-key-title { font-size: 13px; font-weight: 700; color: var(--txt); }
    .ai-key-status { font-size: 11px; color: var(--txt3); }
    .ai-key-input-row { display: flex; gap: 10px; align-items: center; }
    .chat-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 24px; overflow: hidden; }
    .chat-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .chat-title { font-size: 14px; font-weight: 700; color: var(--txt); }
    .chat-status { font-size: 12px; color: var(--txt3); }
    .chat-messages { padding: 16px 20px; display: grid; gap: 10px; max-height: 260px; overflow-y: auto; }
    .chat-empty { color: var(--txt3); font-size: 13px; line-height: 1.6; }
    .chat-msg { max-width: 82%; padding: 10px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
    .chat-msg.user { justify-self: end; background: rgba(99,102,241,.18); border: 1px solid rgba(99,102,241,.25); color: #dbeafe; }
    .chat-msg.assistant { justify-self: start; background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--txt2); }
    .chat-input-row { display: flex; gap: 10px; padding: 14px 20px 18px; border-top: 1px solid var(--border); }
    .chat-input { flex: 1; min-width: 0; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--txt); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; }
    .chat-input:focus { border-color: var(--indigo); box-shadow: 0 0 0 2px rgba(99,102,241,.15); }
    @media(max-width:700px){ .ai-key-input-row, .chat-input-row { flex-direction: column; align-items: stretch; } .chat-msg { max-width: 100%; } }

    .footer { text-align: center; padding: 20px; font-size: 12px; color: var(--txt3); border-top: 1px solid var(--border); margin-top: auto; }
  </style>
</head>
<body>
<div id="bg-mesh"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = window.location.origin;

const MARKETS = [
  { code: "DK",  name: "Denmark",              flag: "🇩🇰" },
  { code: "CZ",  name: "Czech Republic",       flag: "🇨🇿" },
  { code: "SK",  name: "Slovakia",             flag: "🇸🇰" },
  { code: "ES",  name: "Spain",                flag: "🇪🇸" },
  { code: "FI",  name: "Finland",              flag: "🇫🇮" },
  { code: "FR",  name: "France",               flag: "🇫🇷" },
  { code: "NL",  name: "Netherlands",          flag: "🇳🇱" },
  { code: "NO",  name: "Norway",               flag: "🇳🇴" },
  { code: "PE",  name: "Peru",                 flag: "🇵🇪" },
  { code: "PT",  name: "Portugal",             flag: "🇵🇹" },
  { code: "SE",  name: "Sweden",               flag: "🇸🇪" },
  { code: "UAE", name: "United Arab Emirates", flag: "🇦🇪" },
  { code: "UK",  name: "United Kingdom",       flag: "🇬🇧" },
];

const REVIEW_METRICS = [

function extractNum(data, key) {
  if (data == null) return null;
  if (typeof data === "number") return data;
  if (typeof data !== "object") return null;
  if ("value" in data) return typeof data.value === "number" ? data.value : null;
  const p = data.raw != null ? data.raw : data;
  if (Array.isArray(p.data) && p.data.length > 0) {
    const row = p.data[0];
    if (row && typeof row.metrics === "object" && row.metrics !== null) {
      const v = row.metrics[key];
      if (typeof v === "number") return v;
    }
  }
  if (p.metrics && typeof p.metrics === "object" && !Array.isArray(p.metrics)) {
    if (typeof p.metrics[key] === "number") return p.metrics[key];
  }
  if (Array.isArray(p.metrics)) {
    for (const item of p.metrics) {
      if (item && typeof item === "object" && typeof item[key] === "number") return item[key];
    }
  }
  if (typeof p[key] === "number") return p[key];
  return null;
}
function extractObj(data, key) {
  if (data == null) return null;
  if ("value" in data) { const v = data.value; return (v && typeof v === "object" && !Array.isArray(v)) ? v : null; }
  const p = data.raw != null ? data.raw : data;
  if (Array.isArray(p.data) && p.data.length > 0) {
    const row = p.data[0];
    if (row && typeof row.metrics === "object" && row.metrics !== null) {
      const v = row.metrics[key];
      if (v && typeof v === "object" && !Array.isArray(v)) return v;
    }
  }
  return null;
}
function fmtNum(val, type) {
  if (val === null || val === undefined) return null;
  if (type === "rating") return val.toFixed(1);
  if (val >= 1e6) return (val / 1e6).toFixed(2) + "M";
  if (val >= 1e3) return (val / 1e3).toFixed(1) + "K";
  return Math.round(val).toLocaleString();
}
function fmtCount(v) {
  if (v == null) return "--";
  return v >= 1000 ? (v / 1000).toFixed(1) + "K" : String(v);
}

function StarRating({ value }) {
  return (
    <div className="stars">
      {[1,2,3,4,5].map(i => {
        const cls = i <= Math.floor(value) ? "star-full" : i - 0.5 <= value ? "star-half" : "star-empty";
        return <span key={i} className={cls}>&#9733;</span>;
      })}
    </div>
  );
}

function ReplyTimeBreakdownCard({ raw, loading }) {

  const fast = obj ? (obj.fast || 0) : null;
  const slow = obj ? (obj.slow || 0) : null;
  const notReplied = obj ? (obj.not_replied || 0) : null;
  const total = obj ? (obj.total || 0) : null;
  const pct = (v) => (total > 0 ? Math.round(v / total * 100) : 0);
  const buckets = [
    { label: "Fast",     val: fast,       color: "#10b981", bg: "rgba(16,185,129,.08)", border: "rgba(16,185,129,.22)", mark: "+" },
    { label: "Slow",     val: slow,       color: "#f59e0b", bg: "rgba(245,158,11,.08)", border: "rgba(245,158,11,.22)", mark: "~" },
    { label: "No Reply", val: notReplied, color: "#f43f5e", bg: "rgba(244,63,94,.08)",  border: "rgba(244,63,94,.22)",  mark: "x" },
  ];
  return (
    <div className="card rt-card-mb" style={{"--card-accent":"linear-gradient(135deg,#06b6d4,#6366f1)","--card-icon-bg":"rgba(6,182,212,.15)"}}>

          {loading ? <div className="skel" style={{height:22,width:110,marginTop:6}} />
            : total !== null ? <div className="rt-total">{fmtCount(total)} <span style={{fontSize:14,fontWeight:600}}>total reviews</span></div>
            : null}
        </div>
      </div>
      {loading ? (
        <div className="rt-breakdown">{[0,1,2].map(i => <div key={i} className="skel" style={{height:82,borderRadius:10}} />)}</div>
      ) : obj ? (
        <>
          <div className="rt-breakdown">

                <div className="rt-bucket-top">
                  <div className="rt-bucket-icon" style={{background:b.color+"22",color:b.color}}>{b.mark}</div>
                  <div className="rt-bucket-name">{b.label}</div>

            <div className="rt-bar-seg" style={{flex:pct(slow),background:"#f59e0b"}} />

    </div>
  );
}

function PresenceChart({ metrics, metricsData }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const labels = metrics.map(m => m.label);
    const values = metrics.map(m => extractNum(metricsData[m.key], m.key) || 0);
    chartRef.current = new Chart(canvasRef.current.getContext("2d"), {
      type: "bar",
      data: { labels, datasets: [{ data: values, backgroundColor: metrics.map(m => m.color+"55"), borderColor: metrics.map(m => m.color), borderWidth: 2, borderRadius: 8, borderSkipped: false, hoverBackgroundColor: metrics.map(m => m.color+"99") }] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 600 },
        plugins: { legend: { display: false }, tooltip: { backgroundColor: "rgba(10,18,40,.96)", borderColor: "rgba(255,255,255,.1)", borderWidth: 1, titleColor: "#f1f5f9", bodyColor: "#94a3b8", padding: 12, cornerRadius: 10, callbacks: { label: ctx => " " + ctx.raw.toLocaleString() } } },
        scales: {
          x: { grid: { color: "rgba(255,255,255,.04)" }, ticks: { color: "#4b5f79", font: { size: 11 } } },
          y: { grid: { color: "rgba(255,255,255,.04)" }, ticks: { color: "#4b5f79", font: { size: 11 }, callback: v => v >= 1e6 ? (v/1e6).toFixed(1)+"M" : v >= 1e3 ? (v/1e3).toFixed(0)+"K" : v }, beginAtZero: true },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [metricsData]);
  return (
    <div className="chart-wrap">
      <div className="chart-title">&#128202; Presence Metrics Overview</div>
      <div className="chart-inner"><canvas ref={canvasRef} /></div>
    </div>
  );
}

function ChatPanel({ selectedMarket, hasData, openAiConfigured, data, apiErrors }) {
  const [messages, setMessages] = useState([]);
  const [draft, setDraft] = useState("");
  const [sending, setSending] = useState(false);

  const send = useCallback(async () => {
    const question = draft.trim();
    if (!question || sending) return;
    const nextMessages = [...messages, { role: "user", content: question }];
    setMessages(nextMessages);
    setDraft("");
    setSending(true);
    try {
      const r = await fetch(API + "/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: question,
          market: selectedMarket,
          metrics: data,
          errors: apiErrors,
          history: messages,
        }),
      });
      const json = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(json.error || "Chat request failed");
      setMessages([...nextMessages, { role: "assistant", content: json.answer || "No answer returned." }]);
    } catch (e) {
      setMessages([...nextMessages, { role: "assistant", content: e.message || "Chat failed." }]);
    } finally {
      setSending(false);
    }
  }, [draft, sending, messages, selectedMarket, data, apiErrors]);

  return (
    <div className="chat-panel">
      <div className="chat-head">
        <div className="chat-title">Ask the Data</div>
        <div className="chat-status">
          {openAiConfigured ? (hasData ? "Using loaded metrics" : "Load metrics first") : "OpenAI key needed"}
        </div>
      </div>
      <div className="chat-messages">
        {messages.length === 0 ? (
          <div className="chat-empty">
            {hasData
              ? "Ask about ratings, reviews, impressions, directions, calls, website clicks, or API errors for the selected market."
              : "Run the dashboard for a market, then ask questions about the loaded metrics."}
          </div>
        ) : messages.map((m, i) => (
          <div key={i} className={"chat-msg " + m.role}>{m.content}</div>
        ))}
      </div>
      <div className="chat-input-row">
        <input
          className="chat-input"
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") send(); }}
          placeholder={openAiConfigured ? "Ask a question about this market's data..." : "Configure OpenAI in API Keys to chat..."}
          disabled={!openAiConfigured || sending}
        />
        <button className="btn btn-run" onClick={send} disabled={!openAiConfigured || sending || !draft.trim()}>
          {sending ? <><div className="spinner" />Asking...</> : "Send"}
        </button>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const initKeys = {};
  MARKETS.forEach(m => { initKeys[m.code] = ""; });

  const [activeTab,      setActiveTab]      = useState("dashboard");
  const [localKeys,      setLocalKeys]      = useState(initKeys);
  const [openAiKey,      setOpenAiKey]      = useState("");
  const [openAiConfigured, setOpenAiConfigured] = useState(false);
  const [savedMarkets,   setSavedMarkets]   = useState([]);
  const [selectedMarket, setSelectedMarket] = useState(null);
  const [saving,         setSaving]         = useState(false);
  const [savingOpenAi,   setSavingOpenAi]   = useState(false);
  const [data,           setData]           = useState({});
  const [apiErrors,      setApiErrors]      = useState({});
  const [loading,        setLoading]        = useState(false);
  const [hasData,        setHasData]        = useState(false);
  const [fetchedAt,      setFetchedAt]      = useState(null);
  const [toast,          setToast]          = useState(null);

  const notify = (msg, type) => setToast({ msg, type: type || "ok", id: Date.now() });

  useEffect(() => {
    fetch(API + "/api/health")
      .then(r => r.json())
      .then(json => {
        setSavedMarkets(json.configured_markets || []);
        setOpenAiConfigured(!!json.openai_configured);
        if (!selectedMarket && (json.configured_markets || []).length > 0) {
          setSelectedMarket(json.configured_markets[0]);
        }
      })
      .catch(() => {});
  }, []);

  useEffect(() => {
    setData({}); setApiErrors({}); setHasData(false); setFetchedAt(null);
  }, [selectedMarket]);

  const saveKeys = useCallback(async () => {
    const keysToSave = {};
    Object.entries(localKeys).forEach(([market, key]) => {
      if (key && key.trim()) keysToSave[market] = key.trim();
    });
    if (Object.keys(keysToSave).length === 0) { notify("Enter at least one API key.", "err"); return; }
    setSaving(true);
    try {
      const r = await fetch(API + "/api/set-keys", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keys: keysToSave }),
      });
      if (!r.ok) throw new Error("Backend error");
      const json = await r.json();
      setSavedMarkets(json.configured || []);
      notify("Saved: " + json.saved.join(", "), "ok");
      if (!selectedMarket && json.saved.length > 0) setSelectedMarket(json.saved[0]);
      setActiveTab("dashboard");
    } catch (e) {
      notify("Cannot reach backend. Is app.py running on port 5000?", "err");
    } finally {
      setSaving(false);
    }
  }, [localKeys, selectedMarket]);

  const saveOpenAi = useCallback(async () => {
    const key = openAiKey.trim();
    if (!key) { notify("Enter an OpenAI key.", "err"); return; }
    setSavingOpenAi(true);
    try {
      const r = await fetch(API + "/api/set-openai-key", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ openai_key: key }),
      });
      if (!r.ok) throw new Error("Backend error");
      setOpenAiConfigured(true);
      setOpenAiKey("");
      notify("OpenAI key saved for chat.", "ok");
    } catch (e) {
      notify("Cannot save OpenAI key. Is the backend running?", "err");
    } finally {
      setSavingOpenAi(false);
    }
  }, [openAiKey]);

  const run = useCallback(async () => {
    if (!selectedMarket) { notify("Select a market first.", "err"); return; }
    setLoading(true);
    try {
      const r = await fetch(API + "/api/metrics?market=" + selectedMarket);
      if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || "HTTP " + r.status); }
      const json = await r.json();
      setData(json.metrics || {}); setApiErrors(json.errors || {});
      setHasData(true); setFetchedAt(new Date());
      const errCount = Object.keys(json.errors || {}).length;
      notify(errCount > 0 ? selectedMarket + " loaded with " + errCount + " error(s)." : selectedMarket + " loaded!", errCount > 0 ? "err" : "ok");
    } catch (e) {
      notify(e.message || "Failed to fetch metrics.", "err");
    } finally {
      setLoading(false);
    }
  }, [selectedMarket]);

  const activeMarket = MARKETS.find(m => m.code === selectedMarket);
  const unsaved = savedMarkets.length === 0;

  return (
    <div className="layout">
      <nav className="navbar">
        <div className="nav-brand">
          <div className="logo-box">P</div>
          <div>
            <div className="nav-title">Partoo Analytics</div>
            <div className="nav-sub">Business Intelligence</div>
          </div>
        </div>

        <div className="nav-tabs">
          <button className={"nav-tab"+(activeTab==="dashboard"?" active":"")} onClick={() => setActiveTab("dashboard")}>
            &#128202; Dashboard
          </button>
          <button className={"nav-tab"+(activeTab==="settings"?" active":"")} onClick={() => setActiveTab("settings")}>
            &#128273; API Keys
            {unsaved
              ? <span className="nav-tab-badge warn">setup</span>
              : <span className="nav-tab-badge">{savedMarkets.length}</span>}
          </button>
        </div>

        <div className="nav-right">
          {activeMarket && (
            <div className="nav-market">
              <span className="nav-market-flag">{activeMarket.flag}</span>
              <span>{activeMarket.name}</span>
            </div>
          )}
          <div className={"pill "+(selectedMarket?"pill-on":"pill-off")}>
            <div className={"dot "+(selectedMarket?"dot-pulse":"")} />
            {selectedMarket ? selectedMarket + " Active" : "No Market"}
          </div>
        </div>
      </nav>

      <main className="main">
        {activeTab === "settings" && (
          <SettingsTab
            localKeys={localKeys}
            setLocalKeys={setLocalKeys}
            savedMarkets={savedMarkets}
            onSave={saveKeys}
            saving={saving}
            openAiKey={openAiKey}
            setOpenAiKey={setOpenAiKey}
            openAiConfigured={openAiConfigured}
            onSaveOpenAi={saveOpenAi}
            savingOpenAi={savingOpenAi}
          />
        )}
        {activeTab === "dashboard" && (
          <DashboardTab
            savedMarkets={savedMarkets}
            selectedMarket={selectedMarket}
            setSelectedMarket={setSelectedMarket}
            onRun={run}
            onGoToSettings={() => setActiveTab("settings")}
            loading={loading}
            hasData={hasData}
            fetchedAt={fetchedAt}
            data={data}
            apiErrors={apiErrors}
            openAiConfigured={openAiConfigured}
          />
        )}
      </main>

      <div className="footer">Partoo Analytics Dashboard &middot; Powered by Partoo API</div>
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
